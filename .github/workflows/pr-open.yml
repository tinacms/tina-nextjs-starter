name: Build Pull request
on:
  pull_request:
    types: [opened, synchronize, reopened]
env:
  # Dummy values for fork-safe PR builds. `pnpm build-local` uses
  # `tinacms build --content=local --skip-cloud-checks`, so it indexes
  # content from the filesystem and skips cloud validation — these env
  # vars just need to be present (not real) to satisfy the CLI's
  # requirement that clientId/branch/token be configured.
  NEXT_PUBLIC_TINA_CLIENT_ID: fake-id-for-smoke
  TINA_TOKEN: fake-token-for-smoke
  NEXT_PUBLIC_TINA_BRANCH: main
jobs:
  build:
    runs-on: ubuntu-latest
    name: Build sample
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        id: pnpm-install
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build-local
